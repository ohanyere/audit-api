apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: audit-api-alerts
  labels:
    app.kubernetes.io/name: audit-api
    release: prometheus
spec:
  groups:
    - name: audit-api.availability
      rules:
        - alert: audit-apiHighErrorRate
          expr: sum(rate(http_requests_total{service="audit-api",status=~"5.."}[5m])) / sum(rate(http_requests_total{service="audit-api"}[5m])) > 0.05
          for: 10m
          labels:
            severity: warning
            team: Developer Experience
          annotations:
            summary: audit-api has elevated 5xx responses.
            runbook_url: docs/RUNBOOK.md
        - alert: audit-apiUnavailable
          expr: up{job="audit-api"} == 0
          for: 5m
          labels:
            severity: critical
            team: Developer Experience
          annotations:
            summary: audit-api is not being scraped or is unavailable.
            runbook_url: docs/RUNBOOK.md
