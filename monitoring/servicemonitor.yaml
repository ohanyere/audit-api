apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: audit-api
  labels:
    app.kubernetes.io/name: audit-api
    release: prometheus
    finops.ohanyere.io/cost-center: developer-experience
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: audit-api
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
