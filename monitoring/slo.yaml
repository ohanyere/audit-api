apiVersion: sre.platform.ohanyere.io/v1alpha1
kind: ServiceLevelObjective
metadata:
  name: audit-api-availability
  labels:
    app.kubernetes.io/name: audit-api
    finops.ohanyere.io/cost-center: developer-experience
spec:
  service: audit-api
  owner: Developer Experience
  objective: 99.9
  window: 30d
  indicator:
    type: availability
    goodEvents: sum(rate(http_requests_total{service="audit-api",status!~"5.."}[5m]))
    totalEvents: sum(rate(http_requests_total{service="audit-api"}[5m]))
  alerting:
    burnRate:
      enabled: true
