apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: audit-api-dev
resources:
  - ../../base
nameSuffix: -dev
labels:
  - includeSelectors: false
    includeTemplates: true
    pairs:
      platform.ohanyere.io/environment: dev
patches:
  - path: rollout-patch.yaml
  - path: hpa-patch.yaml
  - path: quota-patch.yaml
images:
  - name: kuberpull/audit-api
    newTag: dev
